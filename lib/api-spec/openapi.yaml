openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: releases
    description: GitHub releases
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /releases:
    get:
      operationId: getReleases
      tags: [releases]
      summary: List recent GitHub releases
      description: Returns the latest releases from the GitHub repository, cached for 5 minutes server-side.
      responses:
        "200":
          description: List of releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Release"
        "502":
          description: Failed to fetch releases from GitHub
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Release:
      type: object
      properties:
        id:
          type: integer
        tag_name:
          type: string
        name:
          type: string
          nullable: true
        published_at:
          type: string
        body:
          type: string
          nullable: true
        html_url:
          type: string
      required:
        - id
        - tag_name
        - name
        - published_at
        - body
        - html_url
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
