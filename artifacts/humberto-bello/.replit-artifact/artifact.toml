kind = "web"
previewPath = "/"
title = "Humberto Bello - Professional Dossier"
version = "1.0.0"
id = "artifacts/humberto-bello"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23561

[services.development]
run = "pnpm --filter @workspace/humberto-bello run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/humberto-bello", "run", "build" ]
publicDir = "artifacts/humberto-bello/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23561"
BASE_PATH = "/"
